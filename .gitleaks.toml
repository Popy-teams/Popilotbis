# Configuration Gitleaks — Popilot
# https://github.com/gitleaks/gitleaks

title = "Popilot gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Faux positifs connus du projet Popilot"
paths = [
  '''db/init/''',
  '''server/src/scripts/seed\.js''',
  '''\.github/workflows/''',
  '''e2e/''',
  '''src/app/auth/AuthPage\.tsx''',
  '''src/app/utils/supabase/info\.tsx''',
  '''UserControlled/''',
]
regexes = [
  '''Popilot2026!''',
  '''dev-popilot-jwt-secret''',
  '''ci-test-secret''',
  '''e2e-ci-secret''',
  '''e2e-test-jwt-secret''',
]
