title: "Rapport de bug"
description: Signaler un comportement incorrect ou une régression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de décrire le problème avec le plus de détails possible. Les captures d'écran et logs aident beaucoup.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que s'est-il passé ? Qu'attendiez-vous ?
      placeholder: "Ex. L'onglet Audit ISO 9001 affiche un écran blanc après connexion."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste numérotée des actions
      placeholder: |
        1. Se connecter avec admin@popilot.com
        2. Cliquer sur Audit ISO 9001
        3. ...
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL / route concernée
      placeholder: "/audit"

  - type: dropdown
    id: environment
    attributes:
      label: Environnement
      options:
        - Local (Docker)
        - Local (pnpm dev)
        - Production
        - CI / GitHub Actions
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / messages d'erreur
      description: Console navigateur, réseau, ou logs API
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Vérifications
      options:
        - label: J'ai vérifié que le bug n'existe pas déjà dans les issues ouvertes
          required: true
