services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://popilot:popilot@db:5432/popilot
      - VITE_API_URL=/api
      - VITE_API_PROXY=http://api:3001
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://popilot:popilot@db:5432/popilot
      - JWT_SECRET=dev-popilot-jwt-secret-change-in-production
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@popilot.local
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: popilot
      POSTGRES_USER: popilot
      POSTGRES_PASSWORD: popilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U popilot -d popilot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
